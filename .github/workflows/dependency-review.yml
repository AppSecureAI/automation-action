name: Dependency Review

on:
  pull_request:
    branches:
      - 'main'
      - 'release/**'
    paths:
      - package.json
      - package-lock.json

permissions:
  contents: read
  pull-requests: read

jobs:
  dependency-review:
    name: Dependency Review
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd

      - name: Review dependency changes
        id: dependency-review
        continue-on-error: true
        uses: actions/dependency-review-action@2031cfc080254a8a887f58cffee85186f0e49e48
        with:
          fail-on-severity: moderate

      - name: Report dependency review availability
        if: steps.dependency-review.outcome == 'failure'
        run: |
          echo "::warning::GitHub dependency review is unavailable for this repository. Enable Dependency Graph and GitHub Advanced Security to make this review fail closed."
