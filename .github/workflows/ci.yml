name: Continuous Integration

on:
  pull_request:
    branches:
      - main
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  id-token: write

jobs:
  validate-pr:
    name: Validate PR
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version-file: .node-version
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Check format
        run: npm run format:check

      - name: Lint
        run: npm run lint

      - name: Run focused tests
        run: |
          NODE_OPTIONS=--experimental-vm-modules NODE_NO_WARNINGS=1 \
            npx jest --runInBand __tests__/version-service.test.ts __tests__/main.test.ts

      - name: Build dist
        run: npm run package

      - name: Verify dist is committed
        run: |
          if [ "$(git diff --ignore-space-at-eol --text dist/ | wc -l)" -gt "0" ]; then
            echo "Detected uncommitted dist/ changes after build:"
            git diff --ignore-space-at-eol --text dist/
            exit 1
          fi
