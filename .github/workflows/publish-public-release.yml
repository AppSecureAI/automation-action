name: Publish Public Release

on:
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      tag:
        description: SemVer tag to publish, for example v1.0.9
        required: false

permissions:
  contents: read

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm
      - run: npm ci
      - name: Determine publish mode
        id: mode
        run: |
          should_publish=true
          echo "should_publish=${should_publish}" >> "$GITHUB_OUTPUT"
      - name: Determine version tag
        id: tag
        run: |
          TAG="${{ github.event.release.tag_name || inputs.tag }}"
          if [[ -z "$TAG" ]]; then
            echo "Manual publish requires a SemVer tag input (for example: v1.0.9)." >&2
            exit 1
          fi
          echo "tag=$TAG" >> "$GITHUB_OUTPUT"
      - name: Extract source versions for parity logging
        id: version
        run: ./scripts/check-version-parity.sh --output "$GITHUB_OUTPUT"
      - name: Enforce mirror-only release policy
        run:
          ./scripts/check-version-parity.sh --tag "${{ steps.tag.outputs.tag }}"
      - name: Validate mirror repository access
        env:
          GH_TOKEN:
            ${{ secrets.AUTOMATION_ACTION_TOKEN || secrets.PUBLIC_REPO_TOKEN }}
        run: |
          gh api repos/AppSecureAI/automation-action --jq '.permissions.push'
      - name: Run publish script
        env:
          GH_TOKEN:
            ${{ secrets.AUTOMATION_ACTION_TOKEN || secrets.PUBLIC_REPO_TOKEN }}
        run:
          ./scripts/publish-public.sh --push --tag "${{ steps.tag.outputs.tag
          }}" --verbose
      - name: Verify mirrored version, tags, and dist parity
        run: |
          git clone --depth 1 https://github.com/AppSecureAI/automation-action.git public-mirror
          cd public-mirror
          if [[ ! -f package.json ]]; then
            echo "Mirror parity failed: expected public package.json" >&2
            exit 1
          fi
          diff -qr "${GITHUB_WORKSPACE}/dist" ./dist
      - name: Create or update public GitHub release
        env:
          GH_TOKEN:
            ${{ secrets.AUTOMATION_ACTION_TOKEN || secrets.PUBLIC_REPO_TOKEN }}
          TAG: ${{ steps.tag.outputs.tag }}
        run: |
          gh release create "$TAG" --repo AppSecureAI/automation-action --generate-notes || \
            gh release edit "$TAG" --repo AppSecureAI/automation-action --notes-file CHANGELOG.md
      - name: Publish summary
        run: |
          cat >> "$GITHUB_STEP_SUMMARY" <<'SUMMARY'
          ### Source Version Parity
          | Source | Version |
          | --- | --- |
          | package.json | ${{ steps.version.outputs.package_json }} |
          | src/version.ts | ${{ steps.version.outputs.version_ts }} |

          ### Mirror Policy
          Private release tags are the source of truth for public mirror releases.

          ### Mirror Parity Verification
          Public mirror version, tags, and dist artifacts were verified before release publication.
          SUMMARY
