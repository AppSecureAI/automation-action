name: Supply Chain Guard

on:
  pull_request:
    branches:
      - 'main'
      - 'release/**'
  push:
    branches:
      - 'main'
      - 'release/**'

permissions:
  contents: read

jobs:
  guard:
    name: Shared catalog guard
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd

      - name: Run supply-chain guard
        run: npm run check:supply-chain-catalog

      - name: Run supply-chain guard self-test
        run: npm run test:supply-chain-guard
