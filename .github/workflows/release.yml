name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm
      - run: npm ci
      - name: Enforce version parity (source of truth)
        id: meta
        run: |
          TAG="${GITHUB_REF_NAME}"
          ./scripts/check-version-parity.sh --tag "$TAG" --output "$GITHUB_OUTPUT"
          ./scripts/check-version-parity.sh --tag "$TAG"
      - name: Generate changelog
        run: npm run changelog
      - name: Commit and push changelog
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add CHANGELOG.md
          git commit -m "docs: update changelog for ${GITHUB_REF_NAME}" || true
          git push origin HEAD:main
      - name: Update floating tags
        run: |
          git tag -fa "${{ steps.meta.outputs.major }}" -m "Update ${{ steps.meta.outputs.major }} to ${GITHUB_REF_NAME}"
          git tag -fa "${{ steps.meta.outputs.minor }}" -m "Update ${{ steps.meta.outputs.minor }} to ${GITHUB_REF_NAME}"
          git push origin "${{ steps.meta.outputs.major }}" --force
          git push origin "${{ steps.meta.outputs.minor }}" --force
      - name: Release notes
        run: |
          cat >> "$GITHUB_STEP_SUMMARY" <<'SUMMARY'
          ### Source Version Parity
          | Source | Version |
          | --- | --- |
          | package.json | ${{ steps.meta.outputs.package_json }} |
          | src/version.ts | ${{ steps.meta.outputs.version_ts }} |
          SUMMARY
      - uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
